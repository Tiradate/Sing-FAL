<!doctype html>
<html lang="{{ current_lang|default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('login') }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5">
        <div class="card shadow-sm">
          <div class="card-header bg-white text-center">
            <h5 class="mb-0">{{ t('admin_login') }}</h5>
          </div>
          <div class="card-body">
            {% if error %}
              <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="post">
              <div class="mb-3">
                <label class="form-label">{{ t('username') }}</label>
                <input class="form-control" type="text" name="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">{{ t('password') }}</label>
                <input class="form-control" type="password" name="password" required>
              </div>
              <button class="btn btn-primary w-100" type="submit">{{ t('login') }}</button>
              <a class="btn btn-outline-secondary w-100 mt-2" href="{{ url_for('map_full') }}">
                {{ t('home_page_for_guest') }}
              </a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
